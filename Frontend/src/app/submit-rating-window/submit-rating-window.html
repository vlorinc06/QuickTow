<div class="container-fluid p-4">
    <div class="text-center mb-4 ">
        <h2 class="h2 fw-bold mb-2">Autómentő értékelése</h2>

        <p class="fs-3 fw-semibold mb-0">{{ towUserLastName }} {{towUserFirstName}}</p>
        <p class="fs-5 fw-semibold mb-0">({{ towUserUsername }})</p>

    </div>

    <div class="mb-4 text-center">


        <div class="d-flex justify-content-center gap-2">
            @for (star of [1, 2, 3, 4, 5]; track star) {
            <button type="button" class="btn p-0 border-0 bg-transparent star-button"
                [ngClass]="{ 'active-star': isStarActive(star) }" (click)="setRating(star)"
                (mouseenter)="setHover(star)" (mouseleave)="clearHover()">
                ★
            </button>
            }
        </div>

    </div>

    <div class="mb-4">
        <label for="reviewText" class="form-label fw-semibold">
            Szöveges értékelés <span class="text-muted fw-normal">(opcionális)</span>
        </label>
        <textarea id="reviewText" class="form-control" rows="4" [(ngModel)]="reviewText"
            placeholder="Írd le röviden a tapasztalatodat..." maxlength="200"></textarea>
    </div>

    <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-outline-secondary px-4" (click)="closeDialog()" [disabled]="loading()">
            Mégsem
        </button>

        <button type="button" class="btn btn-success px-4 fw-semibold" (click)="submitRating()"
            [disabled]="selectedStars() === 0 || loading()">
            Értékelés küldése
        </button>
    </div>
</div>
